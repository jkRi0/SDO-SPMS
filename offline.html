<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#3b7ca8" />
  <title>Offline - STMS</title>
  <style>
    :root{--primary:#3b7ca8;--bg:#f5f7fa;--card:#fff;--text:#1a1a1a;--muted:#6b7280;}
    html,body{height:100%;}
    body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;color:var(--text);display:flex;align-items:center;justify-content:center;padding:24px;}
    .card{width:100%;max-width:560px;background:var(--card);border-radius:14px;box-shadow:0 10px 25px rgba(0,0,0,.08);padding:22px;}
    .top{display:flex;align-items:center;gap:14px;margin-bottom:10px;}
    .logo{width:56px;height:56px;border-radius:50%;object-fit:cover;flex:0 0 auto;box-shadow:0 2px 10px rgba(0,0,0,.08)}
    h1{font-size:18px;margin:0;}
    p{margin:8px 0 0 0;color:var(--muted);line-height:1.45;}
    .btns{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
    .btn{appearance:none;border:0;border-radius:10px;padding:10px 12px;font-weight:600;cursor:pointer;}
    .btn-primary{background:var(--primary);color:#fff;}
    .btn-light{background:#eef2f7;color:#111;}
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <img class="logo" src="assets/images/sdo-logo.png" alt="Logo" />
      <div>
        <h1>You are offline</h1>
        <p>STMS can open cached pages, but some data may be unavailable until you reconnect.</p>
      </div>
    </div>
    <div class="btns">
      <button class="btn btn-primary" onclick="location.reload()">Try again</button>
      <button class="btn btn-light" onclick="location.href='dashboard.php'">Go to dashboard</button>
    </div>
  </div>
</body>
</html>
